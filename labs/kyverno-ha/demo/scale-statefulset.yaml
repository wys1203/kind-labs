apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zone-spread-scale-demo
  namespace: kyverno-ha-demo
  labels:
    app: zone-spread-scale-demo
    ha-zone-spread: "enabled"
spec:
  serviceName: zone-spread-scale-demo
  replicas: 6
  selector:
    matchLabels:
      app: zone-spread-scale-demo
      ha-zone-spread: "enabled"
  template:
    metadata:
      labels:
        app: zone-spread-scale-demo
        ha-zone-spread: "enabled"
    spec:
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: block-ssd
        resources:
          requests:
            storage: 1Gi
