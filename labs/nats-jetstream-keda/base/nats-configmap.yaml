apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: nats-jetstream-keda
data:
  nats.conf: |
    server_name: nats-jetstream-lab
    port: 4222
    http_port: 8222

    jetstream {
      store_dir: /data/jetstream
    }

    authorization {
      users = [
        {
          user = "orders-app"
          password = "orders-pass"
          permissions = {
            publish = [
              "orders.created",
              "$JS.API.>",
              "$JS.ACK.>",
              "_INBOX.>"
            ]
            subscribe = [
              "orders.created",
              "$JS.API.>",
              "$JS.EVENT.>",
              "$JS.FC.>",
              "_INBOX.>"
            ]
          }
        }
      ]
    }
